experiment:
  name: yolov12n_cpu_40e_416_b2
  description: Local CPU baseline trained from YOLOv12n configuration.
  type: baseline

dataset:
  name: Roboflow Pothole Detection Dataset v2
  data_yaml: data/pothole_detection_v2/data.yaml
  classes:
    - pothole

model:
  architecture: yolov12n
  source: yolov12n.yaml
  initial_weights: null
  output_weights: weights/local/yolov12n_cpu_40e_416_b2_best.pt

training:
  device: cpu
  epochs: 40
  image_size: 416
  batch_size: 2
  workers: 0

evaluation:
  split: test
  image_size: 416
  batch_size: 2
  device: cpu
  metrics:
    precision: 0.750
    recall: 0.611
    map50: 0.696
    map75: 0.312
    map50_95: 0.348

outputs:
  training_project: runs/local_smoke
  training_name: yolov12_smoke
  evaluation_dir: outputs/evaluation/yolov12n_cpu_40e_416_b2_test

notes:
  - Model weights are stored locally and are not committed to Git.
  - This run produced the first usable local baseline for the Gradio demo.
